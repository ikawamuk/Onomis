<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris UI (Mock)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true"></div>
          <div class="brand__text">
            <div class="brand__title">TETRIS</div>
            <div class="brand__subtitle">HTML/CSS UI mock（見た目だけ）</div>
          </div>
        </div>
        <div class="topbar__actions">
          <button class="btn" type="button">Start</button>
          <button class="btn btn--ghost" type="button">Pause</button>
          <button class="btn btn--ghost" type="button">Reset</button>
        </div>
      </header>

      <main class="layout" aria-label="Tetris UI">
        <aside class="panel panel--left" aria-label="Left panel">
          <section class="card">
            <h2 class="card__title">HOLD</h2>
            <div class="mini-board" aria-label="Hold preview (mock)">
              <div class="blocks" aria-hidden="true">
                <div class="block piece-t" style="--x: 1; --y: 1"></div>
                <div class="block piece-t" style="--x: 2; --y: 1"></div>
                <div class="block piece-t" style="--x: 3; --y: 1"></div>
                <div class="block piece-t" style="--x: 2; --y: 2"></div>
              </div>
            </div>
          </section>

          <section class="card">
            <h2 class="card__title">STATS</h2>
            <dl class="stats">
              <div class="stats__row">
                <dt>Score</dt>
                <dd>012,340</dd>
              </div>
              <div class="stats__row">
                <dt>Level</dt>
                <dd>07</dd>
              </div>
              <div class="stats__row">
                <dt>Lines</dt>
                <dd>038</dd>
              </div>
            </dl>
          </section>

          <section class="card">
            <h2 class="card__title">CONTROLS</h2>
            <ul class="keys" aria-label="Key hints (mock)">
              <li><kbd>←</kbd><span>Move</span><kbd>→</kbd></li>
              <li><kbd>↓</kbd><span>Soft drop</span></li>
              <li><kbd>Space</kbd><span>Hard drop</span></li>
              <li><kbd>Z</kbd>/<kbd>X</kbd><span>Rotate</span></li>
              <li><kbd>C</kbd><span>Hold</span></li>
            </ul>
          </section>
        </aside>

        <section class="stage" aria-label="Game board">
          <div class="stage__frame">
            <div class="stage__header" aria-label="Mode/status (mock)">
              <div class="pill">Marathon</div>
              <div class="pill pill--good">Back-to-back</div>
              <div class="pill pill--warn">Combo x3</div>
            </div>

            <div class="board" role="img" aria-label="Tetris board (mock)">
              <div class="blocks" aria-hidden="true">
                <!-- current piece (I) -->
                <div class="block piece-i" style="--x: 3; --y: 2"></div>
                <div class="block piece-i" style="--x: 4; --y: 2"></div>
                <div class="block piece-i" style="--x: 5; --y: 2"></div>
                <div class="block piece-i" style="--x: 6; --y: 2"></div>

                <!-- ghost -->
                <div class="block piece-i ghost" style="--x: 3; --y: 16"></div>
                <div class="block piece-i ghost" style="--x: 4; --y: 16"></div>
                <div class="block piece-i ghost" style="--x: 5; --y: 16"></div>
                <div class="block piece-i ghost" style="--x: 6; --y: 16"></div>

                <!-- a small stack -->
                <div class="block piece-s" style="--x: 1; --y: 19"></div>
                <div class="block piece-s" style="--x: 2; --y: 19"></div>
                <div class="block piece-s" style="--x: 2; --y: 18"></div>
                <div class="block piece-s" style="--x: 3; --y: 18"></div>

                <div class="block piece-o" style="--x: 4; --y: 18"></div>
                <div class="block piece-o" style="--x: 5; --y: 18"></div>
                <div class="block piece-o" style="--x: 4; --y: 19"></div>
                <div class="block piece-o" style="--x: 5; --y: 19"></div>

                <div class="block piece-l" style="--x: 7; --y: 17"></div>
                <div class="block piece-l" style="--x: 7; --y: 18"></div>
                <div class="block piece-l" style="--x: 7; --y: 19"></div>
                <div class="block piece-l" style="--x: 8; --y: 19"></div>
              </div>
            </div>

            <div class="stage__footer" aria-label="Status bar (mock)">
              <div class="meter">
                <div class="meter__label">Next level</div>
                <div class="meter__bar" aria-hidden="true"><div class="meter__fill"></div></div>
              </div>
              <div class="hint">UI only</div>
            </div>
          </div>
        </section>

        <aside class="panel panel--right" aria-label="Right panel">
          <section class="card">
            <h2 class="card__title">NEXT</h2>
            <div class="queue" aria-label="Next queue (mock)">
              <div class="mini-board mini-board--queue">
                <div class="blocks" aria-hidden="true">
                  <div class="block piece-j" style="--x: 1; --y: 1"></div>
                  <div class="block piece-j" style="--x: 1; --y: 2"></div>
                  <div class="block piece-j" style="--x: 2; --y: 2"></div>
                  <div class="block piece-j" style="--x: 3; --y: 2"></div>
                </div>
              </div>
              <div class="mini-board mini-board--queue">
                <div class="blocks" aria-hidden="true">
                  <div class="block piece-z" style="--x: 1; --y: 2"></div>
                  <div class="block piece-z" style="--x: 2; --y: 2"></div>
                  <div class="block piece-z" style="--x: 2; --y: 1"></div>
                  <div class="block piece-z" style="--x: 3; --y: 1"></div>
                </div>
              </div>
              <div class="mini-board mini-board--queue">
                <div class="blocks" aria-hidden="true">
                  <div class="block piece-o" style="--x: 1; --y: 1"></div>
                  <div class="block piece-o" style="--x: 2; --y: 1"></div>
                  <div class="block piece-o" style="--x: 1; --y: 2"></div>
                  <div class="block piece-o" style="--x: 2; --y: 2"></div>
                </div>
              </div>
            </div>
          </section>

          <section class="card">
            <h2 class="card__title">BONUS</h2>
            <div class="badges" aria-label="Badges (mock)">
              <div class="badge">T-Spin</div>
              <div class="badge">Perfect Clear</div>
              <div class="badge badge--muted">No Mistakes</div>
            </div>
          </section>
        </aside>
      </main>

      <footer class="footer">
        <span class="footer__dim">Tip:</span> 次はJSで落下/回転/当たり判定を足すだけ。
      </footer>
    </div>
  </body>
</html>
