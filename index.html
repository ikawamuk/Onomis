<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omino nomino tetris</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <h1 class="site-title">ONOMiS - <span class="title-gothic">Oミノのみのテトリス</span></h1>

      <main class="game-layout">
        <section class="left-panel panel">
          <h2>HOLD</h2>
          <div class="preview-box" aria-label="Hold piece preview">
            <div class="omino"></div>
          </div>

          <h2>SCORE</h2>
          <div class="score-box" aria-label="Current score">000000</div>
        </section>

        <section class="field-panel panel" aria-label="Game field">
          <div class="field-wrap">
            <div class="field" role="img" aria-label="10 by 20 game grid"></div>
            <button id="startButton" class="start-button" type="button">START</button>
          </div>
        </section>

        <section class="right-panel panel">
          <h2>NEXT</h2>
          <div class="preview-stack" aria-label="Next pieces preview">
            <div class="preview-box"><div class="omino"></div></div>
            <div class="preview-box"><div class="omino"></div></div>
            <div class="preview-box"><div class="omino"></div></div>
          </div>
        </section>
      </main>

      <section class="controls" aria-label="Key controls">
        <h2>キー操作</h2>
        <p>A: 左移動 / D: 右移動 / S: 下移動/ W: ハードドロップ</p>
        <p>Q: 左回転 / E: 右回転 / Space: ホールド</p>
      </section>
    </div>
